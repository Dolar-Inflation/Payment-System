spring.application.name=PaymentSystem
server.address=192.168.10.87
server.port=8080
spring.datasource.url=jdbc:postgresql://localhost:5432/paymentdb

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true
#spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

stripe.api-key=${STRIPE_API_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}
yookassa.api.secret = ${UCASA_API_SECRET_KEY}
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379

#spring.session.store-type=redis

logging.level.org.springframework.session=TRACE

#stripe listen --forward-to localhost:8080/api/payments/webhook
#spring.session.redis.flush-mode=on_save
#spring.session.redis.namespace=spring:session

logging.level.org.springframework.data.redis=DEBUG
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
spring.web.resources.add-mappings=true